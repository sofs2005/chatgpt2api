services:
  app:
    image: zyphrzero/chatgpt2api:latest
    pull_policy: always
    container_name: chatgpt2api
    restart: unless-stopped
    ports:
      - "3000:80"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      # 存储后端配置 (可选值: json, sqlite, postgres, git)
      - STORAGE_BACKEND=${STORAGE_BACKEND:-sqlite}
      
      # 数据库配置 (当 STORAGE_BACKEND=sqlite/postgres 时使用)
      # - DATABASE_URL=postgresql://user:password@host:5432/dbname
      # - DATABASE_URL=sqlite:////app/data/chatgpt2api.db

      # 初始管理员密码 (可选，覆盖 .env)
      # - CHATGPT2API_ADMIN_PASSWORD=change_me_please
      
      # 基础 URL (可选)
      # - CHATGPT2API_BASE_URL=https://your-domain.com

      # 检查更新代理 (可选，未设置时复用 CHATGPT2API_PROXY)
      - CHATGPT2API_UPDATE_PROXY_URL=${CHATGPT2API_UPDATE_PROXY_URL:-}
